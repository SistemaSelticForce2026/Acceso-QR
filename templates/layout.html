<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AccessQR | Sistema Residencial</title>

    <!-- ===================================================== -->
    <!-- FAVICON -->
    <!-- ===================================================== -->

    <link rel="icon"
          type="image/png"
          href="{{ url_for('static', filename='img/favicon.png') }}">

    <!-- ===================================================== -->
    <!-- CSS -->
    <!-- ===================================================== -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/main.css') }}">

    <!-- ===================================================== -->
    <!-- FONT AWESOME -->
    <!-- ===================================================== -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- ===================================================== -->
    <!-- GOOGLE FONTS -->
    <!-- ===================================================== -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">


    <!-- ===================================================== -->
    <!-- SOCKET TOAST STYLE -->
    <!-- ===================================================== -->

    <style>

    /* ===================================================== */
    /* SOCKET TOAST */
    /* ===================================================== */

    .socket-toast{

        position:fixed;

        top:25px;
        right:25px;

        display:flex;
        align-items:center;
        gap:14px;

        padding:14px 18px;

        border-radius:18px;

        color:white;

        font-weight:600;

        z-index:999999;

        opacity:0;

        transform:translateX(120px);

        transition:
            transform .35s ease,
            opacity .35s ease;

        backdrop-filter:blur(12px);

        box-shadow:
            0 12px 30px rgba(0,0,0,.18);

        min-width:290px;

        overflow:hidden;

    }


    /* ===================================================== */
    /* MOSTRAR */
    /* ===================================================== */

    .socket-toast.show{

        opacity:1;

        transform:translateX(0);

    }


    /* ===================================================== */
    /* ICONO */
    /* ===================================================== */

    .toast-icon{

        width:40px;
        height:40px;

        border-radius:14px;

        display:flex;
        align-items:center;
        justify-content:center;

        background:rgba(255,255,255,.15);

        flex-shrink:0;

    }


    .toast-icon i{

        font-size:1rem;

    }


    /* ===================================================== */
    /* CONTENIDO */
    /* ===================================================== */

    .toast-content{

        display:flex;

        flex-direction:column;

        line-height:1.3;

    }


    .toast-content strong{

        font-size:.92rem;

        margin-bottom:2px;

        letter-spacing:.3px;

    }


    .toast-content span{

        font-size:.82rem;

        opacity:.96;

    }


    /* ===================================================== */
    /* INFO */
    /* ===================================================== */

    .socket-toast.info{

        background:linear-gradient(
            135deg,
            #2563eb,
            #1d4ed8
        );

    }


    /* ===================================================== */
    /* SUCCESS */
    /* ===================================================== */

    .socket-toast.success{

        background:linear-gradient(
            135deg,
            #16a34a,
            #15803d
        );

    }


    /* ===================================================== */
    /* ERROR */
    /* ===================================================== */

    .socket-toast.error{

        background:linear-gradient(
            135deg,
            #dc2626,
            #b91c1c
        );

    }


    /* ===================================================== */
    /* EFECTO ACTUALIZANDO */
    /* ===================================================== */

    body.updating{

        opacity:.94;

        transition:.35s ease;

    }


    /* ===================================================== */
    /* RESPONSIVE */
    /* ===================================================== */

    @media(max-width:768px){

        .socket-toast{

            right:15px;
            left:15px;

            min-width:auto;

            width:auto;

            top:18px;

        }

    }

    </style>

</head>

<body>

    <!-- ===================================================== -->
    <!-- NAVBAR -->
    <!-- ===================================================== -->

    {% include 'navbar.html' %}

    <!-- ===================================================== -->
    <!-- CONTENIDO -->
    <!-- ===================================================== -->

    <main class="container">

        <!-- ===================================================== -->
        <!-- MENSAJES -->
        <!-- ===================================================== -->

        {% with messages = get_flashed_messages() %}

            {% if messages %}

                <div class="flash-container">

                    {% for message in messages %}

                        <div class="alert info flash-message">

                            <i class="fa-solid fa-circle-info"></i>

                            {{ message }}

                        </div>

                    {% endfor %}

                </div>

            {% endif %}

        {% endwith %}

        <!-- ===================================================== -->
        <!-- CONTENIDO DINAMICO -->
        <!-- ===================================================== -->

        {% block content %}{% endblock %}

    </main>

    <!-- ===================================================== -->
    <!-- FOOTER -->
    <!-- ===================================================== -->

    {% include 'footer.html' %}

    <!-- ===================================================== -->
    <!-- JS -->
    <!-- ===================================================== -->

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

    <!-- ===================================================== -->
    <!-- DARK MODE -->
    <!-- ===================================================== -->

    <script>

        const themeToggle = document.getElementById("themeToggle");

        if (localStorage.getItem("theme") === "dark") {

            document.body.classList.add("dark-mode");

            if (themeToggle) {

                themeToggle.innerHTML =
                    '<i class="fa-solid fa-sun"></i>';

            }

        }

        if (themeToggle) {

            themeToggle.addEventListener("click", () => {

                document.body.classList.toggle("dark-mode");

                if (document.body.classList.contains("dark-mode")) {

                    localStorage.setItem("theme", "dark");

                    themeToggle.innerHTML =
                        '<i class="fa-solid fa-sun"></i>';

                } else {

                    localStorage.setItem("theme", "light");

                    themeToggle.innerHTML =
                        '<i class="fa-solid fa-moon"></i>';

                }

            });

        }

    </script>

    <!-- ===================================================== -->
    <!-- SOCKET.IO -->
    <!-- ===================================================== -->

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script src="{{ url_for('static', filename='js/socket.js') }}"></script>

</body>

</html>
