{% extends 'layout.html' %}

{% block content %}

<div class="card form-card">

    <h1>Nueva contraseña</h1>

    <p class="small">
        Ingresa tu nueva contraseña para recuperar el acceso a tu cuenta.
    </p>

    <form method="POST" id="resetForm">

        <label>Nueva contraseña</label>

        <div class="password-box">

            <input 
                type="password"
                name="password"
                id="password"
                placeholder="Ingresa tu nueva contraseña"
                required
            >

            <i 
                class="fa-solid fa-eye toggle-password"
                onclick="togglePassword('password', this)"
            ></i>

        </div>

        <!-- VALIDACIONES -->

        <div class="password-rules">

            <p id="rule-length">
                <i class="fa-solid fa-circle-xmark"></i>
                Mínimo 8 caracteres
            </p>

            <p id="rule-uppercase">
                <i class="fa-solid fa-circle-xmark"></i>
                Una letra mayúscula
            </p>

            <p id="rule-special">
                <i class="fa-solid fa-circle-xmark"></i>
                Un carácter especial (@$!%*?&)
            </p>

            <p id="rule-number">
                <i class="fa-solid fa-circle-xmark"></i>
                Un número
            </p>

        </div>

        <label>Confirmar contraseña</label>

        <div class="password-box">

            <input 
                type="password"
                name="confirm_password"
                id="confirm_password"
                placeholder="Confirma tu nueva contraseña"
                required
            >

            <i 
                class="fa-solid fa-eye toggle-password"
                onclick="togglePassword('confirm_password', this)"
            ></i>

        </div>

        <p 
            id="match-message"
            class="small"
            style="margin-top:8px;"
        ></p>

        <button 
            type="submit" 
            class="btn"
            id="submitBtn"
            disabled
        >

            <i class="fa-solid fa-key"></i>

            Actualizar contraseña

        </button>

    </form>

</div>

<!-- ===================================== -->
<!-- JAVASCRIPT -->
<!-- ===================================== -->

<script>

const password = document.getElementById("password")

const confirmPassword = document.getElementById("confirm_password")

const submitBtn = document.getElementById("submitBtn")

const matchMessage = document.getElementById("match-message")

password.addEventListener("input", validarPassword)

confirmPassword.addEventListener("input", validarPassword)

function validarPassword(){

    const value = password.value

    const tieneLongitud = value.length >= 8

    const tieneMayuscula = /[A-Z]/.test(value)

    const tieneNumero = /[0-9]/.test(value)

    const tieneEspecial = /[@$!%*?&]/.test(value)

    actualizarRegla("rule-length", tieneLongitud)

    actualizarRegla("rule-uppercase", tieneMayuscula)

    actualizarRegla("rule-number", tieneNumero)

    actualizarRegla("rule-special", tieneEspecial)

    const coincide = value === confirmPassword.value &&
                     confirmPassword.value !== ""

    if(coincide){

        matchMessage.innerHTML = `
            <i class="fa-solid fa-circle-check"></i>
            Las contraseñas coinciden
        `

        matchMessage.style.color = "#16a34a"

    }else{

        matchMessage.innerHTML = `
            <i class="fa-solid fa-circle-xmark"></i>
            Las contraseñas no coinciden
        `

        matchMessage.style.color = "#dc2626"

    }

    if(
        tieneLongitud &&
        tieneMayuscula &&
        tieneNumero &&
        tieneEspecial &&
        coincide
    ){

        submitBtn.disabled = false

        submitBtn.style.opacity = "1"

        submitBtn.style.cursor = "pointer"

    }else{

        submitBtn.disabled = true

        submitBtn.style.opacity = ".6"

        submitBtn.style.cursor = "not-allowed"

    }

}

function actualizarRegla(id, valido){

    const regla = document.getElementById(id)

    if(valido){

        regla.style.color = "#16a34a"

        regla.querySelector("i").className =
            "fa-solid fa-circle-check"

    }else{

        regla.style.color = "#dc2626"

        regla.querySelector("i").className =
            "fa-solid fa-circle-xmark"

    }

}

function togglePassword(id, icon){

    const input = document.getElementById(id)

    if(input.type === "password"){

        input.type = "text"

        icon.classList.remove("fa-eye")

        icon.classList.add("fa-eye-slash")

    }else{

        input.type = "password"

        icon.classList.remove("fa-eye-slash")

        icon.classList.add("fa-eye")

    }

}

</script>

<style>

/* ===================================== */
/* RESET PASSWORD CARD */
/* ===================================== */

.form-card form{

    display:flex;

    flex-direction:column;

    gap:18px;

}


/* ===================================== */
/* TITULO */
/* ===================================== */

.form-card h1{

    margin-bottom:8px;

}


.form-card .small{

    line-height:1.6;

    color:#64748b;

}


/* ===================================== */
/* LABELS */
/* ===================================== */

.form-card label{

    margin-bottom:-10px;

    font-weight:600;

    color:#334155;

}


/* ===================================== */
/* PASSWORD BOX */
/* ===================================== */

.password-box{

    position:relative;

    display:flex;

    align-items:center;

}


/* ===================================== */
/* INPUT PASSWORD */
/* ===================================== */

.password-box input{

    width:100%;

    padding-right:48px;

}


/* ===================================== */
/* ICONO PASSWORD */
/* ===================================== */

.toggle-password{

    position:absolute;

    right:16px;

    color:#64748b;

    cursor:pointer;

    transition:.2s;

}


.toggle-password:hover{

    color:#2563eb;

}


/* ===================================== */
/* PASSWORD RULES */
/* ===================================== */

.password-rules{

    padding:16px;

    border-radius:16px;

    background:#f8fafc;

    border:1px solid #e2e8f0;

    margin-top:5px;

}


.password-rules p{

    display:flex;

    align-items:center;

    gap:10px;

    margin:8px 0;

    font-weight:500;

}


/* ===================================== */
/* MATCH MESSAGE */
/* ===================================== */

#match-message{

    margin-top:-5px;

    font-weight:600;

}


/* ===================================== */
/* BOTON */
/* ===================================== */

.form-card button{

    margin-top:10px;

    transition:.25s;

}


/* ===================================== */
/* BOTON DISABLED */
/* ===================================== */

.form-card button:disabled{

    opacity:.6;

    cursor:not-allowed;

}


/* ===================================== */
/* CARD */
/* ===================================== */

.form-card{

    max-width:520px;

    margin:auto;

}


/* ===================================== */
/* RESPONSIVE */
/* ===================================== */

@media screen and (max-width:600px){

    .form-card{

        padding:22px;

    }

}

</style>

{% endblock %}
