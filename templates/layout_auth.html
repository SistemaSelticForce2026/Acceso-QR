<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AccessQR | {% block title %}Auth{% endblock %}</title>

    <link rel="icon" type="image/png"
        href="{{ url_for('static', filename='img/favicon.png') }}">

    <!-- CSS base -->
    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">

    <!-- CSS componentes base -->
    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/componentes/alertas.css') }}">

    <!-- CSS auth -->
    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/paginas/auth.css') }}">

    {% block extra_css %}{% endblock %}

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

</head>

<body>

    {% block content %}{% endblock %}

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/socket.js') }}"></script>
    {% block extra_js %}{% endblock %}

</body>

</html>
